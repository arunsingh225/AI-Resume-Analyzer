services:
  - type: web
    name: ai-resume-analyzer-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./resume_analyzer.db
      - key: CORS_ORIGINS
        value: "https://ai-resume-analyzer-tawny-theta.vercel.app,http://localhost:5173"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # ── Google OAuth ──────────────────────────────────────────────────
      # Set this in the Render dashboard → your service → Environment tab
      # Value: your OAuth 2.0 Client ID from https://console.cloud.google.com/apis/credentials
      - key: GOOGLE_CLIENT_ID
        sync: false
